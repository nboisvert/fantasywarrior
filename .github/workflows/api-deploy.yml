# Deploys the API to Google Cloud Run.
# Manual trigger only until the GCP project and GitHub secrets exist:
#   secrets.GCP_SA_KEY        -> JSON key of the deploy service account
#   vars.GCP_PROJECT_ID       -> GCP project id
# Once GCP is ready, add a push trigger on backend/** paths.
name: Deploy API to Cloud Run

on:
  workflow_dispatch:

env:
  REGION: northamerica-northeast1
  SERVICE: fantasy-warrior-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2
      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Ensure Artifact Registry repo exists
        run: |
          gcloud artifacts repositories create fantasy-warrior \
            --repository-format=docker --location=${{ env.REGION }} \
            --project ${{ vars.GCP_PROJECT_ID }} --quiet || true
      - name: Build and push image
        run: |
          IMAGE=${{ env.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/fantasy-warrior/${{ env.SERVICE }}:${{ github.sha }}
          docker build -f backend/FantasyWarrior.Api/Dockerfile -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image "$IMAGE" \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --min-instances 0
